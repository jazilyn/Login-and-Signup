<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="style.css" rel="stylesheet">
  <script type="module" src="OrderSend.js" defer></script>
  <title>Place Order</title>
</head>

<body>
  <h2> Place Your Order</h2>
  <p id = "userStatus"> Checking login status... </p>
  <div class="form_container">
    <form id="orderForm">
      <label for="item">Item:</label> <br> 
      <input type="text" id="item" name="item" required> <br>
      <label for="quantity">Quantity:</label> <br>
      <input type="number" id="quantity" name="quantity" min = "1" required> <br>
      <label for = "totalPrice"> Total Price: </label><br> 
      <input type = "number" id = "totalPrice" name = "totalPrice" min = "0" step = "0.01" required> <br>

      <button type="submit">Place Order</button>
    </form>
  </div>
</body>
</html>
